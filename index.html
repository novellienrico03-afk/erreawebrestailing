<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreà - Next Gen Activewear</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .fade-in-up {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.6s; }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="relative h-screen w-full overflow-hidden bg-black text-white font-sans">

    <div class="absolute inset-0 z-0 opacity-60">
        <img 
            src="https://images.unsplash.com/photo-1556816214-cb33618490a6?q=80&w=2070&auto=format&fit=crop" 
            alt="Errea Athletes" 
            class="object-cover w-full h-full"
        />
    </div>

    <nav class="absolute top-0 w-full z-20 flex justify-between items-center p-8">
        <div class="text-3xl font-black tracking-tighter uppercase cursor-pointer">
            Erreà <span class="text-red-600">.</span>
        </div>
        <ul class="hidden md:flex space-x-8 text-sm font-semibold tracking-widest uppercase">
            <li class="hover:text-red-500 transition-colors cursor-pointer">Uomo</li>
            <li class="hover:text-red-500 transition-colors cursor-pointer">Donna</li>
            <li class="hover:text-red-500 transition-colors cursor-pointer">Teamwear</li>
            <li class="hover:text-red-500 transition-colors cursor-pointer">Innovazione</li>
        </ul>
        <div class="flex space-x-6">
            <button aria-label="Search" class="hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </button>
            <button aria-label="Cart" class="hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            </button>
        </div>
    </nav>

    <div class="relative z-10 flex flex-col items-center justify-center h-full text-center px-4">
        
        <h1 class="fade-in-up text-6xl md:text-8xl font-black tracking-tighter uppercase mb-6">
            Ridefinisci il <br class="hidden md:block"/> tuo 
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-red-400">limite</span>.
        </h1>
        
        <p class="fade-in-up delay-1 max-w-xl text-lg md:text-xl font-light tracking-wide mb-10 text-gray-300">
            Nuova collezione Activewear 2026. Ingegneria tessile italiana progettata per le performance più estreme.
        </p>
        
        <div class="fade-in-up delay-2 flex space-x-6">
            <button class="px-8 py-4 bg-white text-black font-bold tracking-widest uppercase hover:bg-gray-200 transition-all duration-300">
                Acquista Ora
            </button>
            <button class="px-8 py-4 border border-white text-white font-bold tracking-widest uppercase hover:bg-white hover:text-black transition-all duration-300">
                Scopri la Tecnologia
            </button>
        </div>
        
    </div>

</body>
</html>
