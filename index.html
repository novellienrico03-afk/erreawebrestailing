<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreà - L'Eccellenza in Volo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .sport-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        /* Animazioni di ingresso fluide */
        .fade-in-up {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.5s; }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Colori di brand */
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .text-azzurro { color: #007FFF; }
        .text-errea-red { color: #E30613; }

        /* Nascondere scrollbar per slider pulito */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Stile Apple per le card (bordi molto arrotondati, ombra morbida) */
        .apple-box {
            border-radius: 2rem;
            background-color: #f9f9fb;
            transition: all 0.4s ease;
        }
        .apple-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
    </style>
</head>
